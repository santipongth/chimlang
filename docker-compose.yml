# dev stack ทั้งชุด (TECH-DECISIONS D9) — `make dev` / `docker compose up -d`
# รหัสผ่านด้านล่างใช้เฉพาะ dev local เท่านั้น (production แยก config + secrets จริง)
x-app-environment: &app-environment
  POSTGRES_URL: postgresql://chimlang:chimlang@postgres:5432/chimlang
  REDIS_URL: redis://redis:6379/0
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  CHIMLANG_GIT_SHA: ${CHIMLANG_GIT_SHA:-local-compose}

services:
  migrate:
    build: .
    command: ["uv", "run", "--no-sync", "python", "-m", "scripts.db_migrations"]
    environment:
      POSTGRES_URL: postgresql://chimlang:chimlang@postgres:5432/chimlang
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: chimlang
      POSTGRES_PASSWORD: chimlang
      POSTGRES_DB: chimlang
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chimlang -d chimlang"]
      interval: 5s
      timeout: 3s
      retries: 10

  neo4j:
    image: neo4j:5-community
    environment:
      # ตั้ง NEO4J_PASSWORD=chimlang_dev ใน .env ให้ตรงกัน
      NEO4J_AUTH: neo4j/chimlang_dev
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474" # browser UI
      - "${NEO4J_BOLT_PORT:-7687}:7687" # bolt
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    env_file: .env
    environment: *app-environment
    command: ["uv", "run", "--no-sync", "uvicorn", "api.app:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "uv", "run", "--no-sync", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  worker:
    build: .
    env_file: .env
    environment: *app-environment
    command: ["uv", "run", "--no-sync", "celery", "-A", "core.tasks.celery_app", "worker", "--pool=solo", "-l", "info", "-Q", "fabric,debate,maintenance"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "uv", "run", "--no-sync", "python", "scripts/check_worker_readiness.py"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  beat:
    build: .
    env_file: .env
    environment: *app-environment
    command: ["uv", "run", "--no-sync", "celery", "-A", "core.tasks.celery_app", "beat", "-l", "info"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  neo4jdata:
