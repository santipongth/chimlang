# Thai mini-benchmark — คัดเลือก crowd model (ADR-0001 เงื่อนไขทบทวนข้อ 1)
# 12 ข้อ 4 หมวด: ประชด/มีม, เกรงใจ, say-do gap, บริบทสังคมไทย
# วิธีให้คะแนน: human review ผลลัพธ์ใน .tmp/benchmark-*.md เทียบกับ expect (0/1/2 ต่อข้อ)
questions:
  - id: sarcasm-1
    category: ประชด
    prompt: |
      ข้อความนี้ผู้เขียนรู้สึกอย่างไรจริงๆ: "เยี่ยมไปเลยค่ะ ฝนตกรถติดหกชั่วโมง ชีวิตดีย์"
      ตอบสั้นๆ พร้อมเหตุผล
    expect: ต้องจับได้ว่าเป็นการประชด (ไม่พอใจ) ไม่ใช่ชมจริง และอ่านคำว่า "ดีย์" ออกว่าเป็นภาษาอินเทอร์เน็ตเชิงเสียดสี
  - id: sarcasm-2
    category: ประชด
    prompt: |
      ในคอมเมนต์ข่าวขึ้นราคาค่าทางด่วน มีคนเขียนว่า "จ่ายครับจ่าย เดี๋ยวขายไตจ่ายให้"
      คอมเมนต์นี้สนับสนุนหรือคัดค้าน อธิบายสั้นๆ
    expect: คัดค้าน — เป็นการประชดแบบไทย (ยอมแบบแดกดัน) ไม่ใช่การยินยอมจริง
  - id: sarcasm-3
    category: ประชด/มีม
    prompt: |
      เขียนคอมเมนต์สั้นๆ 1 ประโยคในสไตล์ชาวเน็ตไทยที่ "ไม่เห็นด้วย" กับนโยบายเก็บค่าธรรมเนียมรถติด
      แบบประชดประชัน ไม่หยาบคาย
    expect: ได้ประโยคที่ประชดเนียนแบบคนไทยจริง (เช่น แกล้งชม/แกล้งขอบคุณ) ไม่ใช่การด่าตรงๆ หรือประโยคแปลจากอังกฤษ
  - id: krengjai-1
    category: เกรงใจ
    prompt: |
      สมชายไม่เห็นด้วยกับหัวหน้าที่เสนอให้ทีมทำงานวันเสาร์ แต่ในที่ประชุมสมชายพูดว่า
      "ก็ได้ครับพี่ แล้วแต่พี่เลย" ถามว่า สมชายเห็นด้วยจริงไหม และพฤติกรรมนี้เรียกว่าอะไรในบริบทไทย
    expect: ไม่เห็นด้วยจริง — เป็นความเกรงใจ/รักษาหน้า ต้องอธิบาย concept เกรงใจได้ ไม่ตีความตามตัวอักษร
  - id: krengjai-2
    category: เกรงใจ
    prompt: |
      คุณเป็นพนักงานบริษัทอายุ 28 ปี เพื่อนร่วมทีมรุ่นพี่ขอยืมเงิน 5,000 บาทเป็นครั้งที่สาม
      คุณไม่อยากให้ยืมแล้ว เขียนข้อความ LINE ตอบปฏิเสธแบบที่คนไทยจะเขียนจริงๆ
    expect: ปฏิเสธแบบอ้อม มีการขอโทษ/อ้างเหตุจำเป็น รักษาความสัมพันธ์ ไม่ปฏิเสธห้วนแบบตะวันตก
  - id: saydo-1
    category: say-do gap
    prompt: |
      ผลสำรวจพบ 70% ของผู้ตอบบอกว่า "ยินดีจ่ายแพงขึ้นเพื่อสินค้ารักษ์โลก"
      แต่ยอดขายสินค้ารักษ์โลกจริงมีแค่ 8% ของตลาด อธิบายว่าทำไมตัวเลขสองตัวนี้ต่างกันได้
    expect: อธิบาย say-do gap / social desirability bias ได้ ไม่สรุปว่าข้อมูลผิดเฉยๆ
  - id: saydo-2
    category: say-do gap
    prompt: |
      ถ้าถามคนกรุงเทพฯ ต่อหน้าว่า "จะเลิกขับรถมาใช้รถไฟฟ้าไหมถ้ามีค่าธรรมเนียมรถติด"
      หลายคนตอบว่า "เลิก" คุณคิดว่าพฤติกรรมจริงหลังมาตรการเริ่มจะเป็นอย่างไร เพราะอะไร
    expect: คาดว่าสัดส่วนที่เลิกจริงต่ำกว่าที่ตอบ พร้อมเหตุผลเชิงพฤติกรรม (ความเคยชิน, ต้นทุนเปลี่ยนพฤติกรรม, ตอบให้ดูดี)
  - id: context-1
    category: บริบทสังคมไทย
    prompt: |
      ทำไมข่าวลือในกลุ่ม LINE ครอบครัวไทยจึงแก้ยากกว่าข่าวลือใน Twitter/X อธิบาย 2-3 เหตุผล
    expect: แตะเรื่อง trust สูงในกลุ่มปิด/ผู้ส่งเป็นญาติ, ไม่มี community fact-check, โครงสร้างกลุ่มปิดที่คนนอกมองไม่เห็น, ผู้สูงอายุเกรงใจไม่เถียงผู้ส่ง
  - id: context-2
    category: บริบทสังคมไทย
    prompt: |
      คำว่า "เดี๋ยวก็เงียบ" ที่คนไทยใช้พูดถึงกระแสดราม่า สะท้อนความเชื่ออะไรของสังคมไทยต่อประเด็นสาธารณะ
    expect: สะท้อน pattern ดราม่าไทยที่พีคเร็ว-ดับเร็ว, ความไม่เชื่อว่าจะเกิดการเปลี่ยนแปลงเชิงระบบ, การรอให้เรื่องผ่านไปแทนการแก้
  - id: context-3
    category: บริบทสังคมไทย
    prompt: |
      หน่วยงานรัฐแถลงนโยบายใหม่ตอน 4 โมงเย็นวันศุกร์ ชาวเน็ตไทยมักตีความ timing แบบนี้ว่าอย่างไร
    expect: ตีความว่าจงใจเลี่ยงกระแส/ปล่อยข่าวช่วงคนเลิกสนใจ (Friday news dump) สะท้อนความไม่ไว้ใจรัฐ
  - id: register-1
    category: ภาษาหลาย register
    prompt: |
      เขียนความเห็นต่อ "การขึ้นค่ารถไฟฟ้า" 3 แบบ แบบละ 1-2 ประโยค:
      (1) แม่ค้าตลาดวัย 55 พูดกับลูกค้า (2) พนักงานออฟฟิศโพสต์ X (3) ข้าราชการตอบผู้สื่อข่าว
    expect: สามแบบต้องต่างกันชัดทั้งคำศัพท์ น้ำเสียง และความเป็นทางการ — ไม่ใช่ประโยคเดียวกันเปลี่ยนสรรพนาม
  - id: register-2
    category: ภาษาหลาย register
    prompt: |
      แปลงประโยคทางการนี้เป็นภาษาที่วัยรุ่นไทยพิมพ์ในทวิตเตอร์:
      "มาตรการดังกล่าวอาจส่งผลกระทบต่อค่าครองชีพของประชาชนอย่างมีนัยสำคัญ"
    expect: ได้ภาษาวัยรุ่นเน็ตจริง (คำย่อ/อีโมจิ/โทนบ่น) ที่ความหมายคงเดิม ไม่ใช่แค่ตัดคำทางการออก
