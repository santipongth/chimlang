event_id: 2566-pm-vote
title: การโหวตเลือกนายกรัฐมนตรีหลังเลือกตั้ง 2566 (กรกฎาคม–สิงหาคม 2566)
event_date: "2023-07-13"
cutoff_date: "2023-07-12"

prediction_targets:
  - id: leader_becomes_pm
    claim: "หัวหน้าพรรคอันดับหนึ่ง (แคนดิเดตของขั้ว 8 พรรค) จะได้รับความเห็นชอบจากรัฐสภาเป็นนายกฯ ภายในสิงหาคม 2566"
    type: binary
    measurement: มติรัฐสภา
  - id: next_pm_from_second_party
    claim: "นายกฯ คนใหม่ที่ได้ในที่สุดภายในปี 2566 จะมาจากพรรคอันดับสอง"
    type: binary
    measurement: มติรัฐสภาและการโปรดเกล้าฯ

measurement_method: |
  เทียบคำทำนายทิศทาง (aggregate) กับ outcome.md — ห้ามใช้ข้อมูลหลัง cutoff (TRUST-03)
  scenario การเมือง: aggregate เท่านั้น + ป้าย simulation_estimate (GOV-02)

notes: |
  case ที่ความไม่แน่นอน ณ cutoff สูงมากและผลจริงสวนความหวังของขั้วเสียงข้างมากจากการเลือกตั้ง
  — ดีสำหรับทดสอบว่า agent ทำนายจากโครงสร้างอำนาจ (เสียง ส.ว.) หรือแค่ตามกระแส
  เอกสาร before/ เป็นบทสรุปเรียบเรียงย้อนหลังจากข้อเท็จจริงสาธารณะก่อน cutoff
