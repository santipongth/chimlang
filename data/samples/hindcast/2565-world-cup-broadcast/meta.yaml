# Hindcast event: ลิขสิทธิ์ถ่ายทอดสดฟุตบอลโลก 2022 ในไทย (พฤศจิกายน 2565)
event_id: 2565-world-cup-broadcast
title: การหาเงินซื้อลิขสิทธิ์ถ่ายทอดสดฟุตบอลโลก 2022 โค้งสุดท้าย (พฤศจิกายน 2565)
event_date: "2022-11-20"

cutoff_date: "2022-11-08"

prediction_targets:
  - id: free_broadcast_secured
    claim: "คนไทยจะได้ดูฟุตบอลโลก 2022 ทางฟรีทีวี (มีการปิดดีลลิขสิทธิ์ทันก่อนเปิดสนาม โดยมีเงินสนับสนุนจากรัฐ/กองทุน + เอกชนสมทบ)"
    type: binary
    measurement: การถ่ายทอดสดจริงทางฟรีทีวีตั้งแต่นัดเปิดสนาม 20 พ.ย. 2565
  - id: platform_dispute
    claim: "แม้ปิดดีลได้ จะเกิดข้อพิพาท/ข้อจำกัดการรับชมบนบางแพลตฟอร์ม (เช่น กล่อง/แอปบางราย 'จอดำ') ตามมา"
    type: binary
    measurement: ข้อพิพาทเรื่องสิทธิการรับชมบนแพลตฟอร์มที่เป็นข่าว/ถึงชั้นศาลระหว่างทัวร์นาเมนต์

measurement_method: |
  เทียบคำทำนายทิศทางของ simulation (aggregate) กับผลทางการใน outcome.md
  ห้ามใช้ข้อมูลใดๆ ที่ลงวันที่หลัง cutoff_date ระหว่างรัน (TRUST-03)
  external retrieval ต้องปิด (hindcast_mode=true) ตลอดการรัน

notes: |
  - เหตุการณ์สื่อ/ธุรกิจ/นโยบายผสม (non-election) — เพิ่มความหลากหลายของ benchmark
  - ความไม่แน่นอนก่อน cutoff สูงจริง: จนถึงต้นเดือนพฤศจิกายนยังไม่มีใครยืนยันว่าไทยจะได้ดู
    และมีข้อถกเถียงเรื่องความเหมาะสมของการใช้เงินกองทุน กสทช.
  - target สองทดสอบว่า engine เข้าใจพลวัต "ดีลรีบปิด + กติกา must-carry ไม่ชัด → ข้อพิพาทตามมา"
  - เอกสาร before/ เรียบเรียงย้อนหลังจากข้อเท็จจริงสาธารณะก่อน cutoff (ข้อจำกัดเดียวกับชุดเดิม)
