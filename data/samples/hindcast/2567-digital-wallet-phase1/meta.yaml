event_id: 2567-digital-wallet-phase1
title: การจ่ายเงินโครงการดิจิทัลวอลเล็ต เฟสแรก (กันยายน 2567)
event_date: "2024-09-25"
cutoff_date: "2024-09-04"

prediction_targets:
  - id: phase1_cash_september
    claim: "เฟสแรกจะจ่ายเป็นเงินสดโอนเข้าบัญชี (ไม่ใช่ผ่านแอปดิจิทัลตามแผนเดิม) ให้กลุ่มเปราะบางภายในเดือนกันยายน 2567"
    type: binary
    measurement: ประกาศทางการ + วันโอนจริงงวดแรก
  - id: phase1_over_10m
    claim: "ผู้ได้รับเงินเฟสแรกจะมากกว่า 10 ล้านคน"
    type: binary
    measurement: ตัวเลขผู้รับโอนทางการของกระทรวงการคลัง

measurement_method: |
  เทียบคำทำนายทิศทาง (aggregate) กับ outcome.md — ห้ามใช้ข้อมูลหลัง cutoff (TRUST-03)

notes: |
  case นโยบายเศรษฐกิจ (non-election) — ณ cutoff (4 ก.ย. 2567) รัฐบาลใหม่เพิ่งเข้ารับตำแหน่ง
  ยังไม่แถลงนโยบาย รูปแบบ/กำหนดเวลาเฟสแรกยังเป็นข่าวไม่ยืนยัน — ความไม่แน่นอนจริง
  เอกสาร before/ เป็นบทสรุปเรียบเรียงย้อนหลังจากข้อเท็จจริงสาธารณะก่อน cutoff
