# Hindcast event: การเลือกตั้งผู้ว่าราชการกรุงเทพมหานคร 2565
event_id: 2565-bkk-governor-election
title: การเลือกตั้งผู้ว่าราชการกรุงเทพมหานคร 22 พฤษภาคม 2565
event_date: "2022-05-22"

# วัน cutoff: ข้อมูล/ความรู้หลังวันนี้ต้องถูก block ทุก layer
cutoff_date: "2022-05-20"

# สิ่งที่ให้ระบบทำนาย (ระดับ aggregate เท่านั้น — สอดคล้อง GOV-02)
prediction_targets:
  - id: winner_landslide
    claim: "ผู้สมัครที่นำในโพลช่วงโค้งสุดท้าย (ผู้สมัครอิสระอดีตรัฐมนตรี) จะชนะแบบทิ้งห่าง โดยได้คะแนนมากกว่าอันดับสองเกิน 2 เท่า"
    type: binary
    measurement: เทียบกับผลคะแนนทางการที่ กกต. รับรอง
  - id: turnout_above_60
    claim: "ผู้มาใช้สิทธิ์เกิน 60% ของผู้มีสิทธิ์"
    type: binary
    measurement: ตัวเลขผู้มาใช้สิทธิ์ทางการ

# วิธีวัดผล
measurement_method: |
  เทียบคำทำนายทิศทางของ simulation (aggregate) กับผลทางการใน outcome.md
  ห้ามใช้ข้อมูลใดๆ ที่ลงวันที่หลัง cutoff_date ระหว่างรัน (TRUST-03)
  external retrieval ต้องปิด (hindcast_mode=true) ตลอดการรัน

# หมายเหตุการเลือกเหตุการณ์นี้
notes: |
  - เหตุการณ์จบก่อนกลางปี 2025 นานพอที่จะอยู่ใน training data ของ LLM ทุกตัวที่พิจารณา
    → เหมาะกับ adversarial leak test: ถ้า filter รั่ว agent จะ "รู้ผล" ได้ทันที
  - เป็น scenario ประเภทเลือกตั้ง: output ต้อง aggregate เท่านั้น ติดป้าย
    simulation_estimate / not_field_poll (กฎเหล็กข้อ 6) — ใช้เป็น benchmark ภายใน
    ห้ามเผยแพร่เป็นการทำนายเลือกตั้ง
  - เอกสารใน before/ เป็น "บทสรุปที่เรียบเรียงย้อนหลัง" จากข้อเท็จจริงสาธารณะก่อน cutoff
    ไม่ใช่บทความจริง — ผู้ใช้ควรตรวจทาน/แทนที่ด้วยเอกสารจริงเมื่อทำ hindcast อย่างเป็นทางการ
