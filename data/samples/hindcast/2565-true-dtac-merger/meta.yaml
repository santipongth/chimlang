# Hindcast event: มติ กสทช. กรณีควบรวมกิจการ True–DTAC
event_id: 2565-true-dtac-merger
title: การพิจารณาของ กสทช. ต่อการควบรวมกิจการระหว่าง True และ DTAC (ตุลาคม 2565)
event_date: "2022-10-20"

# วัน cutoff: ข้อมูล/ความรู้หลังวันนี้ต้องถูก block ทุก layer
cutoff_date: "2022-10-18"

# สิ่งที่ให้ระบบทำนาย (ระดับ aggregate)
prediction_targets:
  - id: merger_proceeds
    claim: "กสทช. จะไม่สั่งห้ามการควบรวม (ดีลเดินหน้าต่อได้ ไม่ว่าจะในรูปมติอนุญาตหรือรับทราบ)"
    type: binary
    measurement: มติที่ประชุม กสทช. และการที่ดีลเดินหน้าจนจดทะเบียนบริษัทใหม่สำเร็จ
  - id: conditions_attached
    claim: "หากดีลเดินหน้า จะมีเงื่อนไข/มาตรการเฉพาะกำกับ (เช่น เพดานราคา, คุณภาพบริการ) แนบมาด้วย"
    type: binary
    measurement: เอกสารเงื่อนไข/มาตรการเฉพาะที่ กสทช. ประกาศ

measurement_method: |
  เทียบคำทำนายทิศทางของ simulation (aggregate) กับผลทางการใน outcome.md
  ห้ามใช้ข้อมูลใดๆ ที่ลงวันที่หลัง cutoff_date ระหว่างรัน (TRUST-03)
  external retrieval ต้องปิด (hindcast_mode=true) ตลอดการรัน

notes: |
  - เหตุการณ์ธุรกิจ/กำกับดูแล (non-election) เพิ่มความหลากหลายของ benchmark คู่กับชุดเลือกตั้ง
  - จบก่อนกลางปี 2025 นาน → อยู่ใน training data ของ LLM แน่นอน เหมาะกับ leak test
  - มีความไม่แน่นอนจริง ณ ก่อน cutoff (ข้อถกเถียงเรื่องอำนาจ "อนุญาต" vs "รับทราบ" ของ กสทช.)
    → เป็น case ที่ดี: ถ้า agent ตอบมั่นใจเกินเหตุอาจเป็นสัญญาณ leak
  - เอกสารใน before/ เป็นบทสรุปเรียบเรียงย้อนหลังจากข้อเท็จจริงสาธารณะก่อน cutoff
    ไม่ใช่บทความจริง — ตรวจทาน/แทนที่ด้วยเอกสารจริงเมื่อทำ hindcast อย่างเป็นทางการ
