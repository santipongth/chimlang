# Hindcast event: คำวินิจฉัยศาลรัฐธรรมนูญคดีความเป็นรัฐมนตรีของนายกฯ เศรษฐา (สิงหาคม 2567)
event_id: 2567-pm-srettha-ruling
title: ศาลรัฐธรรมนูญวินิจฉัยคดีแต่งตั้งรัฐมนตรีของนายกรัฐมนตรี (14 สิงหาคม 2567)
event_date: "2024-08-14"

# วัน cutoff: ข้อมูล/ความรู้หลังวันนี้ต้องถูก block ทุก layer
cutoff_date: "2024-08-12"

prediction_targets:
  - id: pm_removed
    claim: "ศาลรัฐธรรมนูญวินิจฉัยให้ความเป็นรัฐมนตรีของนายกรัฐมนตรีสิ้นสุดลง (นายกฯ พ้นตำแหน่ง)"
    type: binary
    measurement: คำวินิจฉัยศาลรัฐธรรมนูญ 14 ส.ค. 2567
  - id: new_pm_same_month
    claim: "หากนายกฯ พ้นตำแหน่ง สภาผู้แทนราษฎรจะเลือกนายกฯ คนใหม่จากแคนดิเดตพรรคแกนนำรัฐบาลเดิมภายในเดือนสิงหาคม 2567 (ไม่เกิดสุญญากาศยาว/ยุบสภา)"
    type: binary
    measurement: มติสภาผู้แทนราษฎรเลือกนายกรัฐมนตรีคนใหม่ + วันโหวต

measurement_method: |
  เทียบคำทำนายทิศทางของ simulation (aggregate) กับผลทางการใน outcome.md
  ห้ามใช้ข้อมูลใดๆ ที่ลงวันที่หลัง cutoff_date ระหว่างรัน (TRUST-03)
  external retrieval ต้องปิด (hindcast_mode=true) ตลอดการรัน

notes: |
  - case ที่ความไม่แน่นอนก่อน cutoff สูงจริง: ศาลไม่ได้สั่งให้นายกฯ หยุดปฏิบัติหน้าที่ตอนรับคำร้อง
    (ถูกอ่านเป็นสัญญาณบวก) และผลจริงออกมาเป็นมติเสียงข้างมากแบบฉิวเฉียด — agent ที่ตอบมั่นใจ
    เกินเหตุอาจเป็นสัญญาณ leak
  - scenario การเมือง: output ระดับ aggregate เท่านั้น + ป้าย GOV-02
  - เอกสาร before/ เรียบเรียงย้อนหลังจากข้อเท็จจริงสาธารณะก่อน cutoff (ข้อจำกัดเดียวกับชุดเดิม)
