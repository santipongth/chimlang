# Hindcast event: ร่างกฎหมายสมรสเท่าเทียมในวุฒิสภา (มิถุนายน 2567)
event_id: 2567-marriage-equality
title: การพิจารณาร่าง พ.ร.บ. แก้ไขประมวลกฎหมายแพ่งฯ (สมรสเท่าเทียม) ของวุฒิสภา (18 มิถุนายน 2567)
event_date: "2024-06-18"

cutoff_date: "2024-06-16"

prediction_targets:
  - id: senate_approves
    claim: "วุฒิสภาให้ความเห็นชอบร่างกฎหมายสมรสเท่าเทียมในวาระสุดท้ายโดยไม่ตีกลับไปแก้ไข (กระบวนการนิติบัญญัติจบในเดือนมิถุนายน 2567)"
    type: binary
    measurement: มติวุฒิสภา 18 มิ.ย. 2567
  - id: effective_by_jan2025
    claim: "กฎหมายจะมีผลบังคับใช้จริง (เปิดจดทะเบียนสมรสคู่รักเพศเดียวกัน) ภายในเดือนมกราคม 2568"
    type: binary
    measurement: วันประกาศราชกิจจานุเบกษา + วันมีผลบังคับ + การจดทะเบียนวันแรก

measurement_method: |
  เทียบคำทำนายทิศทางของ simulation (aggregate) กับผลทางการใน outcome.md
  ห้ามใช้ข้อมูลใดๆ ที่ลงวันที่หลัง cutoff_date ระหว่างรัน (TRUST-03)
  external retrieval ต้องปิด (hindcast_mode=true) ตลอดการรัน

notes: |
  - เหตุการณ์นโยบายสังคม (non-election) — โดเมนที่ benchmark ยังไม่เคยมี
  - ความไม่แน่นอนก่อน cutoff อยู่ที่ "วุฒิสภาชุดเปลี่ยนผ่าน" (สว. ชุดเดิมกำลังหมดวาระ)
    จะเดินหน้าลงมติเลย ตีกลับแก้ (ทำให้ช้าออกไปมาก) หรือองค์ประชุมมีปัญหา
  - target สองทดสอบการคาดการณ์ timeline ราชการ (ประกาศ + ระยะรอมีผล 120 วัน)
  - เอกสาร before/ เรียบเรียงย้อนหลังจากข้อเท็จจริงสาธารณะก่อน cutoff (ข้อจำกัดเดียวกับชุดเดิม)
