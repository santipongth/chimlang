name: live-provider-smoke

on:
  workflow_dispatch:
    inputs:
      crowd_model:
        description: Priced low-cost OpenRouter crowd model
        required: true
        default: qwen/qwen3.5-flash-02-23
      analyst_model:
        description: Priced low-cost OpenRouter analyst model
        required: true
        default: qwen/qwen3-235b-a22b-2507

jobs:
  openrouter-debate:
    name: Live OpenRouter Debate under BudgetGuard
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: chimlang
          POSTGRES_PASSWORD: chimlang
          POSTGRES_DB: chimlang
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chimlang -d chimlang"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/chimlang_dev
        ports:
          - 7474:7474
          - 7687:7687
        options: >-
          --health-cmd "wget -qO- http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
    env:
      POSTGRES_URL: postgresql://chimlang:chimlang@127.0.0.1:5432/chimlang
      REDIS_URL: redis://127.0.0.1:6379/0
      NEO4J_URI: bolt://127.0.0.1:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: chimlang_dev
      LLM_BASE_URL: https://openrouter.ai/api/v1
      LLM_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      LLM_MODEL_CROWD: ${{ inputs.crowd_model }}
      LLM_MODEL_ANALYST: ${{ inputs.analyst_model }}
      RUN_BUDGET_USD_CAP: "0.05"
      MONTHLY_BUDGET_USD_CAP: "1.00"
      CHIMLANG_GIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Require provider secret
        run: test -n "$LLM_API_KEY"
      - name: Install dependencies
        run: uv sync
      - name: Apply migrations
        run: uv run python -m scripts.db_migrations
      - name: Start real API and worker
        run: |
          uv run uvicorn api.app:app --host 127.0.0.1 --port 8000 > api-live.log 2>&1 &
          uv run celery -A core.tasks.celery_app worker --pool=solo -l info -Q fabric,debate,maintenance > worker-live.log 2>&1 &
      - name: Startup readiness gate
        run: uv run python scripts/wait_for_readiness.py --timeout 120
      - name: Low-cost Debate smoke (real OpenRouter)
        run: uv run python scripts/live_workflow.py --engine debate --agents 2 --rounds 1 --max-estimate-usd 0.05
      - name: Process logs on failure
        if: failure()
        run: |
          tail -n 200 api-live.log || true
          tail -n 200 worker-live.log || true
