name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-unit-mocked:
    name: Backend unit / mocked contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync
      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Unit and mocked integration tests (no live provider)
        run: uv run pytest -q
      - name: Audit Python dependencies
        run: |
          uv export --format requirements-txt --no-hashes --output-file audit-requirements.txt
          uvx pip-audit -r audit-requirements.txt

  browser-stubbed:
    name: Browser stubbed / accessibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        run: npm ci
        working-directory: web
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
        working-directory: web
      - name: Vitest unit tests
        run: npm run test
        working-directory: web
      - name: Build frontend (type-check + bundle)
        run: npm run build
        working-directory: web
      - name: Playwright browser tests (network routes intentionally stubbed)
        run: npm run test:e2e
        working-directory: web
      - name: Audit frontend dependencies
        run: npm audit --audit-level=high
        working-directory: web

  live-integration:
    name: Live integration / real API + worker processes
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: chimlang
          POSTGRES_PASSWORD: chimlang
          POSTGRES_DB: chimlang
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chimlang -d chimlang"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/chimlang_dev
        ports:
          - 7474:7474
          - 7687:7687
        options: >-
          --health-cmd "wget -qO- http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
    env:
      POSTGRES_URL: postgresql://chimlang:chimlang@127.0.0.1:5432/chimlang
      REDIS_URL: redis://127.0.0.1:6379/0
      NEO4J_URI: bolt://127.0.0.1:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: chimlang_dev
      CHIMLANG_GIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          # post-step `uv cache prune --ci` เคย exit 2 บน job นี้ (run 29622722253)
          # ทำให้ job แดงทั้งที่ live workflow ผ่านครบทุก step — ปิด cache แลกเวลา install เล็กน้อย
          enable-cache: false
      - name: Install dependencies
        run: uv sync
      - name: Apply migrations
        run: uv run python -m scripts.db_migrations
      - name: Start real API and worker
        run: |
          uv run uvicorn api.app:app --host 127.0.0.1 --port 8000 > api-live.log 2>&1 &
          uv run celery -A core.tasks.celery_app worker --pool=solo -l info -Q fabric,debate,maintenance > worker-live.log 2>&1 &
      - name: Startup readiness gate
        run: uv run python scripts/wait_for_readiness.py --timeout 120
      - name: Project to stored export over real processes
        run: uv run python scripts/live_workflow.py --engine fabric --agents 2 --rounds 1 --max-estimate-usd 0.01
      - name: Process logs on failure
        if: failure()
        run: |
          tail -n 200 api-live.log || true
          tail -n 200 worker-live.log || true
